<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ADMİN | KONTROL MERKEZİ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 p-6 font-['Inter']">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-black mb-8 border-b-4 border-black pb-4 uppercase">⚙️ Sistem Yönetimi</h1>
        <form id="adminForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-red-600">
                    <label class="text-[10px] font-black text-gray-500 uppercase">Risk Skoru: <span id="rv">50</span></label>
                    <input type="range" id="riskScore" min="0" max="100" class="w-full accent-red-600" oninput="document.getElementById('rv').innerText=this.value">
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-blue-600">
                    <label class="text-[10px] font-black text-gray-500 uppercase">Hürmüz Durumu</label>
                    <select id="hurmuzStatus" class="w-full font-bold mt-2">
                        <option value="AÇIK / GÜVENLİ">AÇIK / GÜVENLİ</option>
                        <option value="RİSKLİ">RİSKLİ</option>
                        <option value="KAPALI">KAPALI</option>
                    </select>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-sm">
                <h2 class="font-black text-blue-600 mb-6 uppercase text-sm">📡 Piyasa Verileri (Bot & Hibrit)</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="marketGrid"></div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-green-600 uppercase text-sm">📝 Özel Manuel Metrikler</h2>
                    <button type="button" onclick="addManualRow()" class="bg-green-600 text-white px-3 py-1 rounded-lg text-xs font-bold">+ EKLE</button>
                </div>
                <div id="manualList" class="space-y-3"></div>
            </div>

            <div class="flex gap-4 sticky bottom-6 bg-white p-6 rounded-2xl shadow-2xl border">
                <input type="password" id="pin" placeholder="PIN" class="w-24 text-center border rounded-lg font-bold">
                <button type="button" id="btnSync" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black uppercase hover:bg-blue-700 transition">Botu Çalıştır</button>
                <button type="submit" class="flex-1 bg-red-600 text-white py-4 rounded-xl font-black uppercase hover:bg-red-700 transition">Kaydet</button>
            </div>
        </form>
    </div>

    <script>
        const tickers = ['brent', 'gold', 'gas', 'vix', 'silver', 'uranium', 'shipping', 'wheat', 'corn', 'copper', 'lithium', 'iron', 'usGas'];
        let lockedMetrics = {};

        const grid = document.getElementById('marketGrid');
        tickers.forEach(t => {
            grid.innerHTML += `
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <div class="flex justify-between mb-2">
                        <label class="text-[9px] font-bold text-slate-400 uppercase">${t}</label>
                        <button type="button" id="lock_${t}" onclick="toggleLock('${t}')" class="text-[9px] font-black px-2 py-1 rounded bg-slate-200 text-slate-500">OTO</button>
                    </div>
                    <input type="number" step="any" id="m_${t}" class="bg-transparent font-black w-full outline-none">
                </div>
            `;
        });

        function toggleLock(t) {
            lockedMetrics[t] = !lockedMetrics[t];
            const btn = document.getElementById('lock_'+t);
            btn.className = lockedMetrics[t] ? "text-[9px] font-black px-2 py-1 rounded bg-red-100 text-red-600 border border-red-600" : "text-[9px] font-black px-2 py-1 rounded bg-slate-200 text-slate-500";
            btn.innerText = lockedMetrics[t] ? "MANUEL" : "OTO";
        }

        function addManualRow(name="", unit="", val=0) {
            const d = document.createElement('div');
            d.className = "flex gap-2 metric-row";
            d.innerHTML = `<input type="text" placeholder="İsim" class="row-n flex-2 p-2 border rounded-lg font-bold" value="${name}"> <input type="text" placeholder="Birim" class="row-u flex-1 p-2 border rounded-lg" value="${unit}"> <input type="number" step="any" class="row-v flex-1 p-2 border rounded-lg font-black" value="${val}"> <button type="button" onclick="this.parentElement.remove()" class="text-red-600 px-2 font-bold">X</button>`;
            document.getElementById('manualList').appendChild(d);
        }

        async function load() {
            const res = await fetch('/api/state');
            const data = await res.json();
            document.getElementById('riskScore').value = data.riskScore || 50;
            document.getElementById('rv').innerText = data.riskScore || 50;
            document.getElementById('hurmuzStatus').value = data.hurmuzStatus || "AÇIK / GÜVENLİ";
            lockedMetrics = data.lockedMetrics || {};
            tickers.forEach(t => {
                document.getElementById('m_'+t).value = data.market[t] || 0;
                if(lockedMetrics[t]) { lockedMetrics[t] = false; toggleLock(t); }
            });
            document.getElementById('manualList').innerHTML = "";
            (data.manualMetrics || []).forEach(m => addManualRow(m.name, m.unit, m.value));
        }

        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const market = {};
            tickers.forEach(t => { market[t] = parseFloat(document.getElementById('m_'+t).value) || 0; });
            const manualMetrics = [];
            document.querySelectorAll('.metric-row').forEach(row => {
                manualMetrics.push({ name: row.querySelector('.row-n').value, unit: row.querySelector('.row-u').value, value: parseFloat(row.querySelector('.row-v').value) });
            });
            const payload = { pin: document.getElementById('pin').value, data: { riskScore: parseInt(document.getElementById('riskScore').value), hurmuzStatus: document.getElementById('hurmuzStatus').value, market: market, lockedMetrics: lockedMetrics, manualMetrics: manualMetrics } };
            const res = await fetch('/api/state', { method: 'POST', body: JSON.stringify(payload) });
            if(res.ok) alert("✅ Kaydedildi!"); else alert("❌ Hata!");
        };

        document.getElementById('btnSync').onclick = async () => {
            const res = await fetch('/api/sync-bot', { method: 'POST', body: JSON.stringify({pin: document.getElementById('pin').value}) });
            if(res.ok) { alert("🤖 Bot verileri tazeledi!"); load(); } else alert("PIN Yanlış!");
        }
        load();
    </script>
</body>
</html>
