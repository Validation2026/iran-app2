<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMİNAL | ADMİN PANELİ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; padding: 20px; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .lock-btn { cursor: pointer; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; transition: all 0.2s; }
        .locked { background: #fee2e2; color: #dc2626; border: 1px solid #dc2626; }
        .unlocked { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-6 max-w-5xl mx-auto">
    <h1 class="text-3xl font-black mb-8 text-slate-800 border-b-4 border-slate-800 pb-4">⚙️ SİSTEM TERMİNALİ</h1>

    <form id="adminForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card border-l-4 border-l-red-600">
                <label class="text-[10px] font-black text-slate-400 uppercase">Risk Skoru: <span id="rv" class="text-red-600 text-lg">50</span></label>
                <input type="range" id="riskScore" min="0" max="100" class="w-full mt-2 accent-red-600" oninput="document.getElementById('rv').innerText=this.value">
            </div>
            <div class="card border-l-4 border-l-blue-600">
                <label class="text-[10px] font-black text-slate-400 uppercase">Hürmüz Durumu</label>
                <select id="hurmuzStatus" class="w-full font-bold text-lg mt-2 outline-none">
                    <option value="AÇIK / GÜVENLİ">AÇIK / GÜVENLİ</option>
                    <option value="RİSKLİ">RİSKLİ</option>
                    <option value="KISMEN KAPALI">KISMEN KAPALI</option>
                    <option value="KAPALI">KAPALI</option>
                </select>
            </div>
        </div>

        <div class="card border-l-4 border-l-green-600">
            <h2 class="text-xs font-black text-green-600 uppercase tracking-widest mb-4">📊 PİYASA VERİLERİ (HİBRİT KONTROL)</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="marketGrid"></div>
        </div>

        <div class="card border-l-4 border-l-gray-800">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xs font-black text-gray-800 uppercase tracking-widest">📝 ÖZEL MANUEL METRİKLER</h2>
                <button type="button" onclick="addManualRow()" class="bg-gray-800 text-white px-3 py-1 rounded text-[10px] font-bold">+ YENİ EKLE</button>
            </div>
            <div id="manualList" class="space-y-2"></div>
        </div>

        <div class="sticky bottom-6 bg-white shadow-2xl p-6 rounded-2xl border border-slate-200 flex gap-4">
            <input type="password" id="pin" placeholder="PIN" class="w-24 text-center font-bold border rounded-lg outline-none focus:border-blue-500" required>
            <button type="button" id="btnSync" class="bg-blue-600 text-white flex-1 font-black rounded-xl uppercase text-sm tracking-widest shadow-lg hover:bg-blue-700 transition">BOTU ÇALIŞTIR</button>
            <button type="submit" class="bg-red-600 text-white flex-1 font-black rounded-xl uppercase text-sm tracking-widest shadow-lg hover:bg-red-700 transition">KAYDET</button>
        </div>
    </form>

    <script>
        const tickers = ['brent', 'gold', 'gas', 'vix', 'silver', 'uranium', 'shipping', 'wheat', 'corn', 'copper', 'lithium', 'iron', 'usGas'];
        let lockedMetrics = {};

        const grid = document.getElementById('marketGrid');
        tickers.forEach(t => {
            grid.innerHTML += `
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[9px] font-bold text-slate-400 uppercase">${t}</label>
                        <div id="lock_${t}" onclick="toggleLock('${t}')" class="lock-btn unlocked">OTO</div>
                    </div>
                    <input type="number" step="any" id="m_${t}" class="bg-transparent font-black text-slate-800 outline-none w-full">
                </div>
            `;
        });

        function toggleLock(t) {
            lockedMetrics[t] = !lockedMetrics[t];
            const btn = document.getElementById('lock_'+t);
            btn.className = lockedMetrics[t] ? "lock-btn locked" : "lock-btn unlocked";
            btn.innerText = lockedMetrics[t] ? "MANUEL" : "OTO";
        }

        function addManualRow(name="", unit="", val=0) {
            const d = document.createElement('div');
            d.className = "flex gap-2 metric-row";
            d.innerHTML = `<input type="text" placeholder="İsim" class="row-n flex-2 p-2 border rounded-lg text-sm font-bold" value="${name}" required> <input type="text" placeholder="Birim" class="row-u flex-1 p-2 border rounded-lg text-sm" value="${unit}"> <input type="number" step="any" class="row-v flex-1 p-2 border rounded-lg text-sm font-black" value="${val}" required> <button type="button" onclick="this.parentElement.remove()" class="bg-red-100 text-red-600 px-3 rounded-lg font-black">X</button>`;
            document.getElementById('manualList').appendChild(d);
        }

        async function load() {
            const res = await fetch('/api/state');
            const data = await res.json();
            document.getElementById('riskScore').value = data.riskScore || 50;
            document.getElementById('rv').innerText = data.riskScore || 50;
            document.getElementById('hurmuzStatus').value = data.hurmuzStatus || "AÇIK / GÜVENLİ";
            
            lockedMetrics = data.lockedMetrics || {};
            tickers.forEach(t => {
                if (data.market && data.market[t] !== undefined) document.getElementById('m_'+t).value = data.market[t];
                if (lockedMetrics[t]) {
                    lockedMetrics[t] = false; // reset for toggle
                    toggleLock(t); // sets to true and updates UI
                }
            });

            document.getElementById('manualList').innerHTML = "";
            (data.manualMetrics || []).forEach(m => addManualRow(m.name, m.unit, m.value));
        }

        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const marketObj = {};
            tickers.forEach(t => { marketObj[t] = parseFloat(document.getElementById('m_'+t).value) || 0; });
            const manualMetrics = [];
            document.querySelectorAll('.metric-row').forEach(row => {
                manualMetrics.push({ name: row.querySelector('.row-n').value, unit: row.querySelector('.row-u').value, value: parseFloat(row.querySelector('.row-v').value) || 0 });
            });

            const payload = {
                pin: document.getElementById('pin').value.trim(),
                data: { riskScore: parseInt(document.getElementById('riskScore').value), hurmuzStatus: document.getElementById('hurmuzStatus').value, market: marketObj, lockedMetrics: lockedMetrics, manualMetrics: manualMetrics }
            };
            try {
                const res = await fetch('/api/state', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                if(res.ok) alert("✅ Tüm Veriler Kaydedildi!"); else alert("❌ Hata veya Yanlış PIN!");
            } catch(e) { alert("Bağlantı hatası!"); }
        };

        document.getElementById('btnSync').onclick = async () => {
            const pin = document.getElementById('pin').value.trim();
            if(!pin) return alert("Önce PIN girin!");
            document.getElementById('btnSync').innerText = "TARANIYOR...";
            try {
                const res = await fetch('/api/sync-bot', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({pin}) });
                if(res.ok) { alert("🤖 Bot verileri tazeledi!"); load(); } else alert("❌ Hata veya Yanlış PIN!");
            } catch(e) { alert("Bağlantı hatası!"); }
            document.getElementById('btnSync').innerText = "BOTU ÇALIŞTIR";
        }
        load();
    </script>
</body>
</html>
