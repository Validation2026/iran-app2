<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMİNAL | ADMİN PANELİ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@500;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9fb; color: #2d3338; }
        .font-headline { font-family: 'Outfit', sans-serif; }
        .section-card { background: #ffffff; border-radius: 1.5rem; padding: 2rem; border: 1px solid #e2e8f0; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .label-text { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #718096; margin-bottom: 0.6rem; display: block; }
        input, select { background: #ffffff; border: 1px solid #cbd5e0; border-radius: 0.75rem; padding: 1rem; width: 100%; font-weight: 700; transition: all 0.2s; }
        input:focus, select:focus { border-color: #ba1e1e; outline: none; box-shadow: 0 0 0 3px rgba(186,30,30,0.1); }
        .btn-sync { background: #3b82f6; color: white; border-radius: 0.75rem; }
        .btn-save { background: #ba1e1e; color: white; border-radius: 0.75rem; }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-[#e2e8f0] pb-6">
            <div>
                <h1 class="text-3xl font-black font-headline tracking-tighter uppercase text-[#1a202c]">KONTROL PANELİ</h1>
                <p class="text-[#718096] text-[10px] font-black tracking-[0.3em] mt-1">SİSTEM YÖNETİMİ</p>
            </div>
        </header>

        <form id="adminForm" class="space-y-6">
            <div class="section-card border-l-4 border-l-[#3b82f6]">
                <label class="label-text text-blue-600">HÜRMÜZ BOĞAZI DURUMU</label>
                <select id="hurmuzStatus" class="bg-blue-50 text-blue-900">
                    <option value="AÇIK / GÜVENLİ">AÇIK / GÜVENLİ</option>
                    <option value="RİSKLİ">RİSKLİ</option>
                    <option value="KISMEN KAPALI">KISMEN KAPALI</option>
                    <option value="KAPALI">KAPALI</option>
                </select>
            </div>

            <div class="section-card">
                <label class="label-text">MANUEL FİNANSAL GİRDİLER</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-gray-500">Polyester ($/Ton)</label><input type="number" id="polyester"></div>
                    <div><label class="text-xs font-bold text-gray-500">Gübre ($/Ton)</label><input type="number" id="gubre"></div>
                    <div><label class="text-xs font-bold text-gray-500">Jet Yakıtı ($/Bbl)</label><input type="number" step="0.01" id="jetFuel"></div>
                    <div><label class="text-xs font-bold text-gray-500">Türkiye 5Y CDS</label><input type="number" id="cds"></div>
                </div>
            </div>

            <div class="sticky bottom-6 bg-white/90 backdrop-blur-md p-6 rounded-2xl border border-gray-200 shadow-xl flex gap-4">
                <input type="password" id="pin" placeholder="PIN KODU" class="w-1/3 text-center tracking-widest" required>
                <button type="button" id="btnSync" class="btn-sync flex-1 font-black uppercase tracking-wider shadow-lg hover:bg-blue-700 transition">BOTU ÇALIŞTIR (HABER & PİYASA)</button>
                <button type="submit" class="btn-save flex-1 font-black uppercase tracking-wider shadow-lg hover:bg-red-800 transition">MANUEL VERİLERİ KAYDET</button>
            </div>
        </form>
    </div>

    <script>
        // Sayfa yüklendiğinde mevcut verileri getir
        fetch('/api/state').then(res => res.json()).then(data => {
            document.getElementById('hurmuzStatus').value = data.hurmuzStatus || "AÇIK / GÜVENLİ";
            document.getElementById('polyester').value = data.manual?.polyester || 0;
            document.getElementById('gubre').value = data.manual?.gubre || 0;
            document.getElementById('jetFuel').value = data.manual?.jetFuel || 0;
            document.getElementById('cds').value = data.manual?.cds || 0;
        });

        // Verileri Kaydet
        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                pin: document.getElementById('pin').value,
                action: "update_manual",
                data: {
                    hurmuzStatus: document.getElementById('hurmuzStatus').value,
                    manual: {
                        polyester: parseFloat(document.getElementById('polyester').value),
                        gubre: parseFloat(document.getElementById('gubre').value),
                        jetFuel: parseFloat(document.getElementById('jetFuel').value),
                        cds: parseFloat(document.getElementById('cds').value)
                    }
                }
            };
            
            const res = await fetch('/api/state', { method: 'POST', body: JSON.stringify(payload) });
            if(res.ok) alert("✅ Kaydedildi!"); else alert("❌ Hata veya Yanlış PIN");
        };

        // Haber & Piyasa Botunu Tetikle
        document.getElementById('btnSync').onclick = async () => {
            const pin = document.getElementById('pin').value;
            if(!pin) return alert("Önce PIN girin!");
            
            document.getElementById('btnSync').innerText = "TARANIYOR...";
            const res = await fetch('/api/sync-bot', { method: 'POST', body: JSON.stringify({pin}) });
            if(res.ok) alert("🤖 Haberler ve Piyasalar Güncellendi!"); 
            else alert("❌ Hata!");
            document.getElementById('btnSync').innerText = "BOTU ÇALIŞTIR (HABER & PİYASA)";
        };
    </script>
</body>
</html>
